<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fata Morgana Mirage Simulator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 100%;
        }
        canvas {
            background: #fafafa;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 100%;
            height: auto;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        input[type="range"] {
            width: 100%;
        }
        .stats {
            margin-top: 10px;
            font-family: monospace;
            font-size: 12px;
            color: #666;
        }
        h2 { margin-top: 0; color: #1a1a1a; }
    </style>
</head>
<body>

<div class="container">
    <h2>Fata Morgana Mirage Simulator</h2>
    <canvas id="mirageCanvas" width="800" height="400"></canvas>
    
    <div class="controls">
        <div class="control-group">
            <label id="label-x">Eye X Position: 0m</label>
            <input type="range" id="slider-x" min="-20" max="50" step="1" value="0">
        </div>
        <div class="control-group">
            <label id="label-y">Eye Height: 1.0m</label>
            <input type="range" id="slider-y" min="0.5" max="5" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label id="label-k">Thermal Gradient (k): 0.0016</label>
            <input type="range" id="slider-k" min="0.0001" max="0.003" step="0.0001" value="0.0016">
        </div>
        <div class="control-group">
            <label>Physics Parameters</label>
            <div class="stats">
                n₀ = 1.0003 | dt = 0.1 | Max Steps = 2000
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('mirageCanvas');
    const ctx = canvas.getContext('2d');

    // Constants
    const n0 = 1.0003;
    const dt = 0.1;
    const maxSteps = 2000;
    const lookAngleDeg = -1.2;
    
    // UI Elements
    const sX = document.getElementById('slider-x');
    const sY = document.getElementById('slider-y');
    const sK = document.getElementById('slider-k');
    
    const lX = document.getElementById('label-x');
    const lY = document.getElementById('label-y');
    const lK = document.getElementById('label-k');

    // Scaling factors for visualization (Pixels per Meter)
    const scaleX = 8; 
    const scaleY = 60;
    const offsetX = 50; // Padding from left

    function draw() {
        const eyeX = parseFloat(sX.value);
        const eyeY = parseFloat(sY.value);
        const kVal = parseFloat(sK.value);

        // Update Labels
        lX.innerText = `Eye X Position: ${eyeX}m`;
        lY.innerText = `Eye Height: ${eyeY}m`;
        lK.innerText = `Thermal Gradient (k): ${kVal.toFixed(4)}`;

        // Clear Canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Ground coordinates (y=0 in simulation is y=350 in canvas)
        const groundY = 350;

        // Draw Grid and Road
        ctx.strokeStyle = '#eee';
        ctx.beginPath();
        for(let i=0; i<canvas.width; i+=50) {
            ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height);
        }
        ctx.stroke();

        ctx.strokeStyle = '#000';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, groundY);
        ctx.lineTo(canvas.width, groundY);
        ctx.stroke();

        // --- 1. Ray Marching (Actual Path) ---
        let x = eyeX;
        let y = eyeY;
        let angle = lookAngleDeg * (Math.PI / 180);
        
        ctx.beginPath();
        ctx.strokeStyle = 'blue';
        ctx.lineWidth = 2;
        ctx.moveTo(offsetX, groundY - (y * scaleY));

        for (let i = 0; i < maxSteps; i++) {
            let n_curr = n0 - kVal * y;
            let dn_dy = -kVal;

            // Snell's law in differential form
            let d_angle = (dn_dy / n_curr) * Math.cos(angle) * dt;
            angle -= d_angle;

            x += Math.cos(angle) * dt;
            y += Math.sin(angle) * dt;

            // Convert to canvas coords
            let canvasX = offsetX + (x - eyeX) * scaleX;
            let canvasY = groundY - (y * scaleY);
            
            ctx.lineTo(canvasX, canvasY);

            if (y < 0 || y > 5 || canvasX > canvas.width) break;
        }
        ctx.stroke();

        // --- 2. Apparent Path (Straight Line) ---
        let distToMirage = -eyeY / Math.tan(lookAngleDeg * (Math.PI / 180));
        let mirageX = eyeX + distToMirage;
        
        let appCanvasX = offsetX + (mirageX - eyeX) * scaleX;

        ctx.beginPath();
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = 'red';
        ctx.moveTo(offsetX, groundY - (eyeY * scaleY));
        ctx.lineTo(appCanvasX, groundY);
        ctx.stroke();
        ctx.setLineDash([]);

        // --- 3. Mirage Point Dot ---
        ctx.fillStyle = 'red';
        ctx.beginPath();
        ctx.arc(appCanvasX, groundY, 6, 0, Math.PI * 2);
        ctx.fill();

        // Legend
        ctx.fillStyle = 'black';
        ctx.font = '12px Arial';
        ctx.fillText("Actual Path (Light Bending)", 10, 20);
        ctx.fillText("Apparent Path (Mirage)", 10, 40);
        
        ctx.fillStyle = 'blue'; ctx.fillRect(160, 12, 15, 8);
        ctx.fillStyle = 'red'; ctx.fillRect(160, 32, 15, 2);
    }

    // Event Listeners
    [sX, sY, sK].forEach(el => el.addEventListener('input', draw));

    // Initial Draw
    draw();
</script>

</body>
</html>
